<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <!-- Afternoon sky gradient -->
  <defs>
    <linearGradient id="afternoonSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#b0e0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lakeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4682b4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#5f9ea0;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90ee90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228b22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1200" height="300" fill="url(#afternoonSky)"/>
  
  <!-- Grass area -->
  <rect y="300" width="1200" height="200" fill="url(#grassGradient)"/>
  
  <!-- Lake -->
  <ellipse cx="600" cy="450" rx="400" ry="150" fill="url(#lakeGradient)"/>
  
  <!-- Trees around the lake -->
  <rect x="150" y="250" width="12" height="80" fill="#8b4513"/>
  <circle cx="156" cy="240" r="25" fill="#228b22"/>
  <circle cx="146" cy="235" r="20" fill="#32cd32"/>
  <circle cx="166" cy="235" r="18" fill="#228b22"/>
  
  <rect x="300" y="260" width="10" height="70" fill="#8b4513"/>
  <circle cx="305" cy="250" r="22" fill="#228b22"/>
  <circle cx="295" cy="245" r="18" fill="#32cd32"/>
  <circle cx="315" cy="245" r="16" fill="#228b22"/>
  
  <rect x="850" y="240" width="14" height="90" fill="#8b4513"/>
  <circle cx="857" cy="230" r="28" fill="#228b22"/>
  <circle cx="847" cy="225" r="22" fill="#32cd32"/>
  <circle cx="867" cy="225" r="20" fill="#228b22"/>
  
  <rect x="1000" y="270" width="8" height="60" fill="#8b4513"/>
  <circle cx="1004" cy="260" r="20" fill="#228b22"/>
  <circle cx="994" cy="255" r="16" fill="#32cd32"/>
  <circle cx="1014" cy="255" r="14" fill="#228b22"/>
  
  <!-- Willow trees by the lake -->
  <rect x="400" y="320" width="10" height="60" fill="#8b4513"/>
  <path d="M 405 310 Q 390 330 395 350 Q 410 340 415 360 Q 420 330 405 310" fill="#9acd32"/>
  <path d="M 405 310 Q 420 325 425 345 Q 410 335 405 355 Q 390 325 405 310" fill="#228b22"/>
  
  <rect x="750" y="310" width="12" height="70" fill="#8b4513"/>
  <path d="M 756 300 Q 740 320 745 340 Q 760 330 770 350 Q 775 320 756 300" fill="#9acd32"/>
  <path d="M 756 300 Q 770 315 775 335 Q 760 325 756 345 Q 740 315 756 300" fill="#228b22"/>
  
  <!-- Flowers in the grass -->
  <circle cx="200" cy="380" r="3" fill="#ff69b4"/>
  <circle cx="250" cy="370" r="2.5" fill="#ffd700"/>
  <circle cx="320" cy="390" r="3" fill="#ff1493"/>
  <circle cx="450" cy="375" r="2" fill="#ff69b4"/>
  <circle cx="550" cy="385" r="3" fill="#ffd700"/>
  <circle cx="650" cy="370" r="2.5" fill="#ff1493"/>
  <circle cx="750" cy="395" r="2" fill="#ff69b4"/>
  <circle cx="900" cy="380" r="3" fill="#ffd700"/>
  <circle cx="1050" cy="375" r="2.5" fill="#ff1493"/>
  
  <!-- Ducks on the lake -->
  <ellipse cx="500" cy="450" rx="8" ry="5" fill="#8b4513"/>
  <circle cx="495" cy="448" r="4" fill="#8b4513"/>
  <ellipse cx="550" cy="470" rx="8" ry="5" fill="#2f4f4f"/>
  <circle cx="545" cy="468" r="4" fill="#2f4f4f"/>
  <ellipse cx="650" cy="440" rx="8" ry="5" fill="#8b4513"/>
  <circle cx="645" cy="438" r="4" fill="#8b4513"/>
  
  <!-- Ripples on water -->
  <ellipse cx="500" cy="450" rx="15" ry="8" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <ellipse cx="550" cy="470" rx="12" ry="6" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <ellipse cx="650" cy="440" rx="18" ry="10" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  
  <!-- Clouds -->
  <ellipse cx="300" cy="80" rx="60" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="280" cy="70" rx="45" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="320" cy="75" rx="40" ry="18" fill="white" opacity="0.8"/>
  
  <ellipse cx="800" cy="100" rx="70" ry="30" fill="white" opacity="0.7"/>
  <ellipse cx="780" cy="90" rx="50" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="820" cy="95" rx="45" ry="20" fill="white" opacity="0.7"/>
  
  <!-- Distant city skyline -->
  <rect x="50" y="200" width="20" height="100" fill="#708090" opacity="0.6"/>
  <rect x="80" y="180" width="25" height="120" fill="#708090" opacity="0.6"/>
  <rect x="110" y="190" width="18" height="110" fill="#708090" opacity="0.6"/>
  <rect x="1100" y="190" width="22" height="110" fill="#708090" opacity="0.6"/>
  <rect x="1130" y="170" width="28" height="130" fill="#708090" opacity="0.6"/>
  <rect x="1160" y="185" width="20" height="115" fill="#708090" opacity="0.6"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">上海世纪公园湖景</text>
</svg>